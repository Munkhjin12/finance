<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="roboto-font bg-light">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="row justify-content-center w-100">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm p-4 rounded-4 border-0">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-2 fw-bold text-success">
                            <i class="fa-solid fa-austral-sign" style="color: #416b83;"></i> Хувийн санхүү бүртгэл
                        </h3>
                        <p class="text-muted text-center small mb-4">Нэвтрэх эсвэл шинээр бүртгүүлэх</p>

                        <form id="auth-form">
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Имэйл хаяг</label>
                                <input type="email" class="form-control form-control-lg fs-6" id="email" required placeholder="Имэйл хаяг оруулах">
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-semibold">Нууц үг</label>
                                <input type="password" class="form-control form-control-lg fs-6" id="password" required placeholder="Нууц үг оруулах">
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" id="btn-login" class="btn btn-success btn-lg fw-semibold fs-6">Нэвтрэх</button>
                                <button type="button" id="btn-register" class="btn btn-outline-secondary btn-lg fs-6">Шинээр бүртгүүлэх</button>
                            </div>
                        </form>
                        <div id="message" class="text-danger text-center small mt-3 fw-medium"></div>
                    </div>
                </div> 
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/99390deed7.js" crossorigin="anonymous"></script>
    
    <script type="module" src="js/auth.js"></script>
</body>
</html>
