<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Хянах самбар - Хувийн санхүү</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fa-solid fa-wallet me-2"></i>Миний Санхүү
            </a>
            <button class="btn btn-sm btn-outline-light" id="btn-logout">
                <i class="fa-solid fa-right-from-bracket me-1"></i> Гарах
            </button>
        </div>
    </nav>

    <div class="container my-5">
        
        <div class="row mb-4">
            <div class="col">
                <h2 class="fw-bold text-secondary">Сайн байна уу! 👋</h2>
                <p class="text-muted">Өнөөдрийн санхүүгийн тойм мэдээлэл.</p>
            </div>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 bg-white p-3">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <p class="text-muted small mb-1 fw-semibold">Нийт үлдэгдэл</p>
                            <h3 class="fw-bold text-dark mb-0" id="total-balance">0 ₮</h3>
                        </div>
                        <div class="bg-primary bg-opacity-10 text-primary rounded-circle p-3 fs-4">
                            <i class="fa-solid fa-scale-balanced"></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 bg-white p-3">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <p class="text-muted small mb-1 fw-semibold">Нийт орлого</p>
                            <h3 class="fw-bold text-success mb-0" id="total-income">0 ₮</h3>
                        </div>
                        <div class="bg-success bg-opacity-10 text-success rounded-circle p-3 fs-4">
                            <i class="fa-solid fa-arrow-trend-up"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 bg-white p-3">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <p class="text-muted small mb-1 fw-semibold">Нийт зарлага</p>
                            <h3 class="fw-bold text-danger mb-0" id="total-expense">0 ₮</h3>
                        </div>
                        <div class="bg-danger bg-opacity-10 text-danger rounded-circle p-3 fs-4">
                            <i class="fa-solid fa-arrow-trend-down"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h5 class="fw-bold mb-4 text-secondary"><i class="fa-solid fa-plus-circle me-2"></i>Гүйлгээ нэмэх</h5>
                    <form id="transaction-form">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Төрөл</label>
                            <select class="form-select" id="trans-type" required>
                                <option value="income">Орлого (+)</option>
                                <option value="expense">Зарлага (-)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Мөнгөн дүн (₮)</label>
                            <input type="number" class="form-control" id="trans-amount" placeholder="0" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-semibold">Тайлбар</label>
                            <input type="text" class="form-control" id="trans-desc" placeholder="Жишээ: Цалин, Хүнс..." required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-semibold">Бүртгэх</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h5 class="fw-bold mb-4 text-secondary"><i class="fa-solid fa-list me-2"></i>Сүүлийн гүйлгээнүүд</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Тайлар</th>
                                    <th>Төрөл</th>
                                    <th>Дүн</th>
                                    <th>Үйлдэл</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-history">
                                <tr>
                                    <td colspan="4" class="text-center text-muted py-4">Одоогоор гүйлгээ бүртгэгдээгүй байна.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="js/dashboard.js"></script>
</body>
</html>
